name: Push Docker Image

on:
  push:
    branches:
      - master
      - main
      - stage
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Login into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get Short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short=7 ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Build the Docker image
        run: |
          docker build --build-arg APP_ENV=production \
               --build-arg RUBY_VERSION=3.3.5 \
               --build-arg PG_MAJOR=15 \
               --build-arg NODE_MAJOR=16 \
               --build-arg YARN_VERSION=1.13.0 \
               --build-arg BUNDLER_VERSION=2.4.10 \
               -t ${{ github.repository }} \
               .

      - name: Tag and Push Docker image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ github.repository }} ${{ github.repository }}:${{ steps.vars.outputs.short_sha }}
          docker push ${{ github.repository }}:${{ steps.vars.outputs.short_sha }}

      - name: Tag LATEST and Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ github.repository }} ${{ github.repository }}:latest
          docker push ${{ github.repository }}:latest

      - name: Tag RELEASE and Push Docker image
        if: github.event_name == 'release'
        run: |
          docker tag ${{ github.repository }} ${{ github.repository }}:${{ github.ref_name }}
          docker push ${{ github.repository }}:${{ github.ref_name }}
